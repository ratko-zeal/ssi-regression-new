[theme]
base="light"
backgroundColor="#FFFFFF"
secondaryBackgroundColor="#F0F2F6"
textColor="#262730"
font="muli"

[server]
headless = true
port = 8080
address = "0.0.0.0"
enableCORS = true
enableWebsocketCompression = false

[browser]
serverAddress = "your-app-name.awsapprunner.com"
serverPort = 443
